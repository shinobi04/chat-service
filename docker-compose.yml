version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: chat-service_ollama_1
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./init_ollama.sh:/init_ollama.sh
    environment:
      - PULL_HEAVY_MODEL=${PULL_HEAVY_MODEL:-false}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    runtime: nvidia
    entrypoint: ["/usr/bin/bash", "/init_ollama.sh"]
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: chat-service_redis_1
    command: redis-server --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    restart: unless-stopped

  app:
    build: .
    container_name: chat-service_app_1
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - ollama
      - redis
    restart: unless-stopped
    volumes:
      - .:/app

volumes:
  ollama_data:
