version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./init_ollama.sh:/init_ollama.sh
    environment:
      - PULL_HEAVY_MODEL=${PULL_HEAVY_MODEL:-false}
    entrypoint: ["/usr/bin/bash", "/init_ollama.sh"]

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - .:/app

volumes:
  ollama_data:
